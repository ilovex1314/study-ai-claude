<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="study-ai-claude">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#152033"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f6df6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="8" fill="#2f6df6"/>

  <!-- brand mark -->
  <g transform="translate(96,96)">
    <rect width="92" height="92" rx="20" fill="url(#mark)"/>
    <g transform="translate(46,46) scale(1.05) translate(-32,-32)">
      <g stroke="#ffffff" stroke-width="3.5" stroke-linecap="round">
        <line x1="20" y1="22" x2="44" y2="22"/>
        <line x1="20" y1="22" x2="32" y2="44"/>
        <line x1="44" y1="22" x2="32" y2="44"/>
      </g>
      <g fill="#ffffff">
        <circle cx="20" cy="22" r="6.5"/>
        <circle cx="44" cy="22" r="6.5"/>
        <circle cx="32" cy="44" r="6.5"/>
      </g>
    </g>
  </g>
  <text x="208" y="132" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif" font-size="34" font-weight="700" fill="#6492f0" letter-spacing="2">study-ai-claude</text>
  <text x="208" y="170" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif" font-size="22" fill="#8b95a3">happyboy 的 AI 学习项目</text>

  <!-- headline -->
  <text x="96" y="330" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif" font-size="76" font-weight="800" fill="#e9edf3">20 天 AI 工程</text>
  <text x="96" y="424" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif" font-size="76" font-weight="800" fill="#e9edf3">学习工作台</text>

  <text x="96" y="510" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif" font-size="30" fill="#c2cad6">本地优先 · 深内容契约 · 关系正确的架构图 · 可验证产出闭环</text>

  <!-- decorative node graph, right side -->
  <g transform="translate(940,430)" opacity="0.85">
    <g stroke="#2f6df6" stroke-width="3">
      <line x1="0" y1="-90" x2="-80" y2="40"/>
      <line x1="0" y1="-90" x2="80" y2="40"/>
      <line x1="-80" y1="40" x2="80" y2="40"/>
      <line x1="0" y1="-90" x2="0" y2="40"/>
    </g>
    <g fill="#6492f0">
      <circle cx="0" cy="-90" r="11"/>
      <circle cx="-80" cy="40" r="11"/>
      <circle cx="80" cy="40" r="11"/>
      <circle cx="0" cy="40" r="11"/>
    </g>
  </g>
</svg>
