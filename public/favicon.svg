<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="study-ai-claude">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f6df6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- node graph motif: three connected nodes -->
  <g stroke="#ffffff" stroke-width="3" stroke-linecap="round">
    <line x1="20" y1="22" x2="44" y2="22"/>
    <line x1="20" y1="22" x2="32" y2="44"/>
    <line x1="44" y1="22" x2="32" y2="44"/>
  </g>
  <g fill="#ffffff">
    <circle cx="20" cy="22" r="6"/>
    <circle cx="44" cy="22" r="6"/>
    <circle cx="32" cy="44" r="6"/>
  </g>
</svg>
